name = "invoice-harness"
compatibility_date = "2024-11-01"
pages_build_output_dir = ".svelte-kit/cloudflare"

# D1 binding.
# ローカル開発(--local)は database_name だけで動きます。
# 本番前に `wrangler d1 create invoice_harness` で発行される ID を database_id に設定してください
# （`pnpm setup` を使うと自動で書き込まれます）。
[[d1_databases]]
binding = "DB"
database_name = "invoice_harness"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "../../packages/db/migrations"

# 社印・ロゴ等の保存先。デプロイ時に `wrangler r2 bucket create invoice-harness-assets`
[[r2_buckets]]
binding = "FILES"
bucket_name = "invoice-harness-assets"
